# Material Technologies - Industrial Era
# The second major transformation in human history

technologies:

  steam-engine:
    name: "Steam Engine"
    layer: material
    year: 1712
    prerequisites:
      hard: [metallurgy, physics]
      soft: [mechanical-clock, engineering, blast-furnace]
      catalyst: [physics, capitalism]

  railroad:
    name: "Railroad"
    layer: material
    year: 1825
    prerequisites:
      hard: [steam-engine, metallurgy]
      soft: [roads, engineering, capitalism, banking]
      catalyst: [steam-engine, capitalism]

  telegraph:
    name: "Telegraph"
    layer: material
    year: 1844
    prerequisites:
      hard: [physics, metallurgy]
      soft: [railroad, scientific-method, electromagnetism]
      catalyst: [physics, railroad]

  electricity:
    name: "Electricity"
    layer: material
    year: 1879
    prerequisites:
      hard: [physics, metallurgy, electromagnetism-phenomenon]
      soft: [chemistry, scientific-method, telegraph, steam-engine]
      catalyst: [physics, electromagnetism]

  internal-combustion:
    name: "Internal Combustion Engine"
    layer: material
    year: 1860
    prerequisites:
      hard: [chemistry, metallurgy]
      soft: [steam-engine, physics, engineering, electricity]
      catalyst: [chemistry, mass-production]

  mass-production:
    name: "Mass Production"
    layer: material
    year: 1800
    prerequisites:
      hard: [steam-engine, metallurgy]
      soft: [engineering, capitalism, division-of-labor, railroad]
      catalyst: [steam-engine, capitalism]
