# Material Technologies - Early Modern Era
# Setting the stage for industrialization

technologies:

  gunpowder-weapons:
    name: "Gunpowder Weapons"
    layer: material
    year: 1000
    prerequisites:
      hard: [metallurgy, chemistry]
      soft: [engineering, military-organization, blast-furnace]
      catalyst: [chemistry, trade]

  navigation-instruments:
    name: "Navigation Instruments"
    layer: material
    year: 1400
    prerequisites:
      hard: [metallurgy, astronomy]
      soft: [optics, mathematics, cartography, mechanical-clock]
      catalyst: [astronomy, trade]

  telescope:
    name: "Telescope"
    layer: material
    year: 1608
    prerequisites:
      hard: [optics, glass-making]
      soft: [astronomy, mathematics, mechanical-clock]
      catalyst: [optics, scientific-method]

  microscope:
    name: "Microscope"
    layer: material
    year: 1590
    prerequisites:
      hard: [optics, glass-making]
      soft: [medicine, scientific-method, printing-press]
      catalyst: [optics, scientific-revolution]
