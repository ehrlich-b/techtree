# Scenarios — breakthrough/discovery gates with explicit confidence.
# These are the "if this happens, then..." nodes. Tech downstream of a low-confidence
# scenario inherits low effective confidence (computed by tools as min over hard prereqs).
#
# Confidence convention:
#   >= 0.50  anchor — main timeline plans around this happening
#   0.20-0.49 probable — design-relevant
#   < 0.20   speculative side-branch — only matters if it fires
#
# Year is the rough target by which the gate is realized at scale, not invention date.

technologies:

